version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: product_management_db
    environment:
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: product_management_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      timeout: 20s
      retries: 10

volumes:
  postgres_data:
